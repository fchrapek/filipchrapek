[phases.setup]
nixPkgs = ["nodejs_23", "pnpm"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile --network-concurrency=2 --child-concurrency=1"]

[phases.build]
cmds = ["pnpm build:pl"]

[start]
cmd = "cd packages/site-pl && pnpm preview --host 0.0.0.0 --port 3000"

[staticAssets]
# Tell Nixpacks where the built static files are located
dir = "packages/site-pl/dist"
